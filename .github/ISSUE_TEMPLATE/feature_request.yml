name: Feature request
description: Suggest an idea or improvement
labels: ["type: feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The user/business need, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: input
    id: prd
    attributes:
      label: Related PRD / phase
      placeholder: "e.g. v2.0 §3, Module C, P11"
