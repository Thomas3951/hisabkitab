name: Deploy landing to GitHub Pages

# Builds the Next.js landing as a static export and publishes it to GitHub Pages
# on hisabkitab.pro. Runs only when the landing changes (or on manual dispatch).
on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/landing-pages.yml'
  workflow_dispatch:

# Pages needs these permissions; concurrency keeps one live deploy at a time.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: landing/pnpm-lock.yaml

      # The landing has its own lockfile (standalone from the monorepo workspace).
      - run: pnpm install --frozen-lockfile --ignore-workspace

      - run: pnpm build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
